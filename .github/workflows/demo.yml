name: Generate Demo GIF

on:
  push:
    paths:
      - demo.tape
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: |
          curl -sLO https://github.com/charmbracelet/vhs/releases/latest/download/vhs_Linux_x86_64.tar.gz
          tar -xzf vhs_Linux_x86_64.tar.gz
          sudo mv vhs /usr/local/bin/

      - name: Generate GIF
        run: vhs demo.tape

      - name: Commit GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo.gif"
          file_pattern: "*.gif"
